<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>:3 Clicker</title>

<link rel="icon" href="favicon.jpeg">
<link rel="stylesheet" href="index.css">

<style>
@font-face{
font-family:Playwrite;
src:url("PlaywritePL-Thin.ttf");
}
</style>

</head>

<body>

<!-- MENU BUTTONS -->
<button id="menuBtn">☰</button>
<button id="gambleBtn">🎰 Gambling</button>

<!-- ACHIEVEMENTS -->
<div id="dropdown">
<h3>Achievements</h3>
<div id="achList"></div>
</div>

<!-- GAMBLING MENU -->
<div id="gambleMenu">
<h3>Gambling</h3>
<button id="spinBtn">SPIN (Cost: 1,000)</button>
<div id="spinResult"></div>
</div>

<!-- NOTIFICATIONS -->
<div id="notif"></div>

<!-- GAME -->
<div id="game">

<div id="counter">:3 : 0</div>

<div id="stats">
<div>:3/sec: <span id="perSec">0</span></div>
<div>:3/click: <span id="perClick">1</span></div>
</div>

<img id="colon3" src="colon3.png">

</div>

<!-- SHOP -->
<div id="shop"></div>

<!-- YOUTUBE PANEL -->
<div id="ytPanel">

<input id="ytSearch" placeholder="Search YouTube...">
<button id="ytBtn">Search</button>

<div id="ytResults"></div>

<div id="ytPlayer"></div>

</div>

<!-- BOTTOM -->
<div id="bottomBar">
<button id="hateBtn">i dont like this game</button>
<div id="version">:3 Clicker v5 YT MUSIC UPDATE</div>
</div>

<!-- VIDEOS -->
<video id="rageVid" src="vid.mp4"></video>
<video id="winVid" src="win.mp4"></video>

<script src="index.js"></script>

</body>
</html>
